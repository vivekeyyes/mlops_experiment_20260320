name: Train and Test Model 20260321

on:
  workflow_dispatch:
    inputs:
      job_type:
        description: "Run train, eval, or both"
        required: true
        default: "both"
        type: choice
        options:
          - train
          - eval
          - both

jobs:
  # --------------------
  # TRAIN JOB
  # --------------------
  train:
    runs-on: self-hosted
    if: ${{ inputs.job_type == 'train' || inputs.job_type == 'both' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Conda
        shell: cmd
        run: |
          call C:\Users\Vivek.Sadarahalli\AppData\Local\anaconda3\condabin\conda.bat init cmd.exe
          call conda activate demo_training

      - name: Train the model
        shell: cmd
        run: |
          call conda activate demo_training
          python scripts/train.py

  # --------------------
  # EVAL JOB (depends on train if running both)
  # --------------------
  eval:
    runs-on: self-hosted
    needs: train
    if: ${{ inputs.job_type == 'both' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Conda
        shell: cmd
        run: |
          call C:\Users\Vivek.Sadarahalli\AppData\Local\anaconda3\condabin\conda.bat init cmd.exe
          call conda activate demo_training

      - name: Evaluate the model
        shell: cmd
        run: |
          call conda activate demo_training
          python scripts/eval.py

  # --------------------
  # EVAL ONLY JOB (runs independently)
  # --------------------
  eval_only:
    runs-on: self-hosted
    if: ${{ inputs.job_type == 'eval' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Conda
        shell: cmd
        run: |
          call C:\Users\Vivek.Sadarahalli\AppData\Local\anaconda3\condabin\conda.bat init cmd.exe
          call conda activate demo_training

      - name: Evaluate the model
        shell: cmd
        run: |
          call conda activate demo_training
          python scripts/eval.py